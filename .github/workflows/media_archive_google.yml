name: X Media Archive to Google Photos

on:
  schedule:
    - cron: "0 0 * * *" # UTC 00:00 -> CST 早上 08:00
  workflow_dispatch:
    inputs:
      time_range:
        description: "抓取时间范围"
        required: true
        default: "3天"
        type: choice
        options:
          - "当天"
          - "3天"
          - "1周"
          - "1个月"
          - "1年"
          - "全部"
      custom_users:
        description: "自定义用户名列表 (逗号分隔，留空则使用内置秘密名单)"
        required: false
        default: ""

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      users_matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Matrix
        id: set-matrix
        env:
          USERS_SECRET: ${{ secrets.TWITTER_USERS_ARCHIVE }}
          CUSTOM_USERS: ${{ github.event.inputs.custom_users }}
        run: |
          USERS="${CUSTOM_USERS:-$USERS_SECRET}"
          CLEAN_USERS=$(echo "$USERS" | tr -d ' ')
          TIME_RANGE_INPUT="${{ github.event.inputs.time_range }}"
          if [[ "$TIME_RANGE_INPUT" == "1年" || "$TIME_RANGE_INPUT" == "全部" ]]; then
            CHUNK_SIZE=2
          else
            CHUNK_SIZE=5
          fi
          JSON_ARRAY=$(python3 -c "import sys, json; users = [u for u in sys.argv[1].split(',') if u]; size = int(sys.argv[2]); chunks = [','.join(users[i:i+size]) for i in range(0, len(users), size)]; print(json.dumps(chunks))" "$CLEAN_USERS" "$CHUNK_SIZE")
          echo "Generated matrix JSON (chunk size $CHUNK_SIZE): $JSON_ARRAY"
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  archive_google:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        user: ${{ fromJson(needs.setup-matrix.outputs.users_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Run Google Photos Archiver for ${{ matrix.user }}
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          GOOGLE_PHOTOS_TOKEN: ${{ secrets.GOOGLE_PHOTOS_TOKEN }}
        run: |
          RANGE="${{ github.event.inputs.time_range || '3天' }}"
          IFS=',' read -ra ADDR <<< "${{ matrix.user }}"
          for u in "${ADDR[@]}"; do
            echo "Processing user: $u"
            python src/tasks/task_google.py --users "$u" --time_range "$RANGE"
          done
