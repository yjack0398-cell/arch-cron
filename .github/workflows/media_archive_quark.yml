name: X Media Archive to Quark

on:
  schedule:
    - cron: "0 6 * * *" # UTC 06:00 -> CST 下午 14:00
  workflow_dispatch:
    inputs:
      time_range:
        description: "爬取时间范围"
        required: true
        type: choice
        options:
          - "当天"
          - "3天"
          - "1周"
          - "1个月"
          - "3个月"
          - "半年"
          - "1年"
          - "全部"
        default: "3天"
      custom_users:
        description: "自定义下载人员 (逗号分隔，留空则执行全体人员)"
        required: false
        type: string
        default: ""

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      users_matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate Matrix
        id: set-matrix
        env:
          USERS_SECRET: ${{ secrets.TWITTER_USERS_ARCHIVE }}
          CUSTOM_USERS: ${{ github.event.inputs.custom_users }}
        run: |
          USERS="${CUSTOM_USERS:-$USERS_SECRET}"
          CLEAN_USERS=$(echo "$USERS" | tr -d ' ')
          # 将长名单切割
          TIME_RANGE_INPUT="${{ github.event.inputs.time_range }}"
          if [[ "$TIME_RANGE_INPUT" == "1年" || "$TIME_RANGE_INPUT" == "全部" ]]; then
            CHUNK_SIZE=2
          else
            CHUNK_SIZE=5
          fi
          JSON_ARRAY=$(python3 -c "import sys, json; users = [u for u in sys.argv[1].split(',') if u]; size = int(sys.argv[2]); chunks = [','.join(users[i:i+size]) for i in range(0, len(users), size)]; print(json.dumps(chunks))" "$CLEAN_USERS" "$CHUNK_SIZE")
          echo "Generated matrix JSON: $JSON_ARRAY"
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  archive_quark:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        user: ${{ fromJson(needs.setup-matrix.outputs.users_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Run Quark Archiver for ${{ matrix.user }}
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          COOKIES_QUARK: ${{ secrets.COOKIES_QUARK }}
          TIME_RANGE: ${{ github.event.inputs.time_range }}
        run: |
          RANGE="${TIME_RANGE:-3天}"
          # matrix.user 现在可能包含多个逗号分隔的用户名
          IFS=',' read -ra ADDR <<< "${{ matrix.user }}"
          for u in "${ADDR[@]}"; do
            echo "Processing user: $u"
            python src/tasks/task_quark.py --users "$u" --time_range "$RANGE"
          done
