name: 115 Series Scanner

on:
  workflow_dispatch:
    inputs:
      start_cid:
        description: "扫描起始目录 CID (0为根目录)"
        required: true
        default: "0"
      depth:
        description: "递归扫描最大深度"
        required: true
        default: "3"

permissions:
  contents: write

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install p115client python-dotenv requests

      - name: Run 115 Scanner
        env:
          COOKIES_115: ${{ secrets.COOKIES_115 }}
        run: |
          python src/tasks/scan_115_dirs.py --start_cid "${{ github.event.inputs.start_cid }}" --depth "${{ github.event.inputs.depth }}"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/config/magnet_series.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(config): 🛡️ Auto-update magnet_series.json from 115 webdisk scan" && git pull --rebase origin main && git push)
